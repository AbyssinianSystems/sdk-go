                        rule_id: api_only_activity_count_24h/v1
                        category: feature
                        label: api-only activity observed in last 24h
                        value: 35
                    recommendation:
                      id: rec_acct_12345_score_acct_12345_score_v1_20260307120100_20260307120100
                      subject_id: acct_12345
                      recommended_at: 2026-03-07T12:01:00Z
                      policy_version: recommend/v1
                      type: review
                      confidence: 0.85
                      rationale: score crossed review threshold with corroborating
                        evidence
                      primary_reason: review_threshold_crossed_corroborated
                      additional_reasons: []
                      score_result:
                        kind: score_result
                        id: score_acct_12345_score_v1_20260307120100
              schema:
                $ref: "#/components/schemas/SubjectEvaluationBundle"
          description: Latest evaluation bundle for the subject
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: No persisted evaluation exists for the subject
      summary: Get the latest persisted evaluation for a subject
      tags:
      - Subject Evaluations
  /v1/subjects/{subject_id}/review-outcomes:
    post:
      description: |
        Records one append-only `ReviewOutcome` against a persisted subject
        `Recommendation` or `ScoreResult`. The service validates that the target
        artifact exists and belongs to the requested subject before persisting
        the review outcome.
      operationId: postSubjectReviewOutcome
      parameters:
      - $ref: "#/components/parameters/SubjectID"
      requestBody:
        content:
          application/json:
            examples:
              recommendationReview:
                value:
                  reviewed_object:
                    kind: recommendation
                    id: rec_acct_12345_score_acct_12345_score_v1_20260307120100_20260307120100
                  reviewer: operator@example
                  label: false_positive
                  notes: manual review confirmed detector noise
                  disposition: no_external_action
            schema:
              $ref: "#/components/schemas/ReviewOutcomeWriteRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewOutcome"
          description: Review outcome persisted
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: Review-outcome request failed validation
        "404":
          content:
            application/json:
              examples:
                notFound:
                  value:
                    status: rejected
                    reason: subject_evaluation_not_found
                    rejection_reasons:
                    - code: not_found
                      field: subject_id
                      message: no evaluation found for subject
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: Subject or reviewed object was not found
        "500":
          content:
            application/json:
              examples:
                lookupFailed:
                  value:
                    status: rejected
                    reason: subject_evaluation_lookup_failed
                    rejection_reasons:
                    - code: storage_error
                      message: latest subject evaluation could not be loaded
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: The latest subject evaluation could not be loaded
      summary: Record a review outcome for a subject artifact
      tags:
      - Subject Evaluations
  /v1/subjects/{subject_id}/signal-events:
    get:
      description: |
        Returns the canonical signal events that were accepted for the subject.
        This makes normalized values and deduplicated event identity inspectable.
      operationId: listSubjectSignalEvents
      parameters:
      - $ref: "#/components/parameters/SubjectID"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubjectSignalEventList"
          description: Canonical signal events for the subject
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: No signal events exist for the subject
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: The subject signal events could not be loaded
      summary: List canonical signal events for a subject
      tags:
      - Signal Events
  /v1/subjects/{subject_id}/evaluations:
    get:
      description: |
        Returns the subject's persisted evaluation history, including replayed
        results across versioned scoring policies.
      operationId: listSubjectEvaluations
      parameters:
      - $ref: "#/components/parameters/SubjectID"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubjectEvaluationHistory"
          description: Evaluation history for the subject
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: No persisted evaluation exists for the subject
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: The subject evaluation history could not be loaded
      summary: List persisted evaluations for a subject
      tags:
      - Subject Evaluations
  /v1/subjects/{subject_id}/investigation:
    get:
      description: |
        Returns the current inspectable investigation artifacts for a subject,
        including signal events, derived artifacts, the latest evaluation, and
        any persisted review outcomes.
      operationId: getSubjectInvestigation
      parameters:
      - $ref: "#/components/parameters/SubjectID"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubjectInvestigation"
          description: Investigation read model for the subject
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: No investigation artifacts exist for the subject
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: The subject investigation could not be loaded
      summary: Get the investigation read model for a subject
      tags:
      - Subject Evaluations
  /v1/subjects/{subject_id}/recompute:
    post:
      description: |
        Rebuilds the subject's feature snapshot, score result, and recommendation
        from stored signal events. When a `score_ruleset_version` is supplied,
        the replay uses that version and persists the resulting artifacts.
      operationId: recomputeSubject
      parameters:
      - $ref: "#/components/parameters/SubjectID"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubjectRecomputeRequest"
        required: false
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubjectEvaluationBundle"
          description: Recomputed subject evaluation bundle
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: The recompute request was invalid
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: No signal events exist for the subject
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: The subject recompute failed
      summary: Recompute and persist a subject evaluation
      tags:
      - Subject Evaluations
  /v1/subjects/{subject_id}/ruleset-comparisons:
    post:
      description: |
        Replays the subject under a candidate score ruleset version, persists the
        candidate artifacts, and returns the baseline-versus-candidate comparison.
      operationId: compareSubjectRuleset
      parameters:
      - $ref: "#/components/parameters/SubjectID"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RulesetComparisonRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RulesetComparison"
          description: Baseline and candidate comparison for the subject
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: The comparison request was invalid
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: No persisted evaluation exists for the subject
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: The ruleset comparison could not be completed
      summary: Compare the latest evaluation with a candidate ruleset replay
      tags:
      - Subject Evaluations
components:
  parameters:
    SubjectID:
      description: Canonical account identifier for the scored subject
      explode: false
      in: path
      name: subject_id
      required: true
      schema:
        minLength: 1
        type: string
      style: simple
  schemas:
    HealthStatus:
      example:
        store: ok
        status: ok
      properties:
        status:
          enum:
          - ok
          - ready
          - not_ready
          type: string
        store:
          enum:
          - ok
          - unavailable
          type: string
      required:
      - status
    RawSignalEventPayload:
      additionalProperties: false
      example:
        subject_id: subject_id
        occurred_at: 2000-01-23T04:56:07.000+00:00
        severity: low
        unit: unit
        correlation_ids:
        - correlation_ids
        - correlation_ids
        producer_event_id: producer_event_id
        confidence: 0.08008281904610115
        producer: producer
        attributes:
          key: attributes
        value: 6.027456183070403
        signal_type: signal_type
      properties:
        subject_id:
          type: string
        producer:
          type: string
        producer_event_id:
          type: string
        signal_type:
          description: Canonical or legacy alias value accepted by ingestion
          type: string
        occurred_at:
          format: date-time
          type: string
        severity:
          enum:
          - low
          - medium
          - high
          - critical
          type: string
        confidence:
          maximum: 1
          minimum: 0
          type: number
        value:
          type: number
        unit:
          type: string
        correlation_ids:
          items:
            type: string
          type: array
        attributes:
          additionalProperties:
            type: string
      required:
      - occurred_at
