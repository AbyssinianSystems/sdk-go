openapi: 3.1.0
info:
  description: |
    Importable OpenAPI document for the current AbyssForge HTTP boundary.

    Current implemented routes:
    - GET /healthz
    - GET /livez
    - GET /readyz
    - POST /v1/signal-events
    - GET /v1/outcome-analysis
    - GET /v1/subjects/{subject_id}/latest-evaluation
    - GET /v1/subjects/{subject_id}/signal-events
    - GET /v1/subjects/{subject_id}/evaluations
    - GET /v1/subjects/{subject_id}/investigation
    - POST /v1/subjects/{subject_id}/review-outcomes
    - POST /v1/subjects/{subject_id}/recompute
    - POST /v1/subjects/{subject_id}/ruleset-comparisons
  title: AbyssForge API
  version: 0.1.0
servers:
- description: Local development server
  url: http://localhost:8080
tags:
- description: Liveness and service metadata
  name: System
- description: Ingest raw detector signals into canonical events and trigger subject
    evaluation
  name: Signal Events
- description: Read APIs for persisted evaluation artifacts
  name: Subject Evaluations
paths:
  /healthz:
    get:
      description: Returns the compatibility liveness response for the running service.
      operationId: getHealthz
      responses:
        "200":
          content:
            application/json:
              examples:
                ok:
                  value:
                    status: ok
              schema:
                $ref: "#/components/schemas/HealthStatus"
          description: Service process is live
        "405":
          content:
            application/json:
              examples:
                rejected:
                  value:
                    status: rejected
                    reason: method_not_allowed
                    rejection_reasons:
                    - code: method_not_allowed
                      message: Method Not Allowed
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: Method not allowed
      summary: Health check
      tags:
      - System
  /livez:
    get:
      description: Returns whether the HTTP process is live enough to serve requests.
      operationId: getLivez
      responses:
        "200":
          content:
            application/json:
              examples:
                ok:
                  value:
                    status: ok
              schema:
                $ref: "#/components/schemas/HealthStatus"
          description: Service process is live
        "405":
          content:
            application/json:
              examples:
                rejected:
                  value:
                    status: rejected
                    reason: method_not_allowed
                    rejection_reasons:
                    - code: method_not_allowed
                      message: Method Not Allowed
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: Method not allowed
      summary: Liveness check
      tags:
      - System
  /readyz:
    get:
      description: Returns whether the running service has an initialized store and
        is ready to serve traffic.
      operationId: getReadyz
      responses:
        "200":
          content:
            application/json:
              examples:
                ready:
                  value:
                    status: ready
                    store: ok
              schema:
                $ref: "#/components/schemas/HealthStatus"
          description: Service is ready
        "503":
          content:
            application/json:
              examples:
                unavailable:
                  value:
                    status: not_ready
                    store: unavailable
              schema:
                $ref: "#/components/schemas/HealthStatus"
          description: Service is not ready
        "405":
          content:
            application/json:
              examples:
                rejected:
                  value:
                    status: rejected
                    reason: method_not_allowed
                    rejection_reasons:
                    - code: method_not_allowed
                      message: Method Not Allowed
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: Method not allowed
      summary: Readiness check
      tags:
      - System
  /v1/signal-events:
    post:
      description: |
        Accepts one raw detector payload, validates and normalizes it into a canonical
        `SignalEvent`, deduplicates it, persists it, evaluates the subject when the
        event is newly accepted, persists the derived feature snapshot, score result,
        and recommendation, and returns the explicit ingestion outcome.
      operationId: postSignalEvent
      requestBody:
        content:
          application/json:
            examples:
              consistentActionInterval:
                value:
                  subject_id: acct_12345
                  producer: interval-detector
                  producer_event_id: det-884221
                  signal_type: consistent-action-interval
                  occurred_at: 2026-03-07T11:45:00Z
                  severity: high
                  confidence: 0.92
                  value: 0.98
                  unit: regularity_score
                  correlation_ids:
                  - sess_789
                  - match_456
                  attributes:
                    platform: pc
                    environment: prod
              apiOnlyActivity:
                value:
                  subject_id: acct_12345
                  producer: api-gateway-detector
                  producer_event_id: det-991112
                  signal_type: api-only-activity
                  occurred_at: 2026-03-07T11:55:00Z
                  severity: critical
                  confidence: 0.95
                  value: 24
                  unit: api_requests
                  correlation_ids:
                  - token_321
                  - client_abc
                  attributes:
                    page_views: "0"
                    api_requests: "24"
              noPageViews:
                value:
                  subject_id: acct_12345
                  producer: client-telemetry-detector
                  producer_event_id: det-771001
                  signal_type: no-page-views
                  occurred_at: 2026-03-07T11:58:00Z
                  severity: medium
                  confidence: 0.91
                  value: 0
                  unit: page_views
                  correlation_ids:
                  - sess_789
                  attributes:
                    page_views: "0"
                    session_kind: api_only
            schema:
              $ref: "#/components/schemas/RawSignalEventPayload"
        required: true
      responses:
        "201":
          content:
            application/json:
              examples:
                accepted:
                  value:
                    status: accepted
                    reason: persisted_new_canonical_event
                    canonical_event_ref:
                      kind: signal_event
                      id: evt_acct_12345_261850d7b8ef8c4d
                    event:
                      id: evt_acct_12345_261850d7b8ef8c4d
                      dedupe_key: producer=interval-detector|producer_event_id=det-884221
                      schema_version: "1"
                      subject_id: acct_12345
                      subject_kind: account
                      producer_event_id: det-884221
                      signal_type: consistent_action_interval
                      producer: interval-detector
                      occurred_at: 2026-03-07T11:45:00Z
                      ingested_at: 2026-03-07T12:00:00Z
                      severity: high
                      confidence: 0.92
                      value: 0.98
                      unit: regularity_score
                      normalization_version: ingest/v1
                      correlation_ids:
                      - sess_789
                      - match_456
                      metadata:
                      - key: environment
                        value: prod
                      - key: platform
                        value: pc
                    evaluation:
                      status: completed
                      snapshot_ref:
                        kind: feature_snapshot
                        id: fs_acct_12345_20260307120000
                      score_result_ref:
                        kind: score_result
                        id: score_acct_12345_score_v1_20260307120000
                      recommendation_ref:
                        kind: recommendation
                        id: rec_acct_12345_score_acct_12345_score_v1_20260307120000_20260307120000
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: New canonical event accepted and subject evaluation completed
        "200":
          content:
            application/json:
              examples:
                duplicateSkipped:
                  value:
                    status: duplicate
                    reason: matched_existing_canonical_event
                    canonical_event_ref:
                      kind: signal_event
                      id: evt_acct_12345_261850d7b8ef8c4d
                    event:
                      id: evt_acct_12345_261850d7b8ef8c4d
                      dedupe_key: producer=interval-detector|producer_event_id=det-884221
                      schema_version: "1"
                      subject_id: acct_12345
                      subject_kind: account
                      producer_event_id: det-884221
                      signal_type: consistent_action_interval
                      producer: interval-detector
                      occurred_at: 2026-03-07T11:45:00Z
                      ingested_at: 2026-03-07T12:00:00Z
                      severity: high
                      confidence: 0.92
                      value: 0.98
                      unit: regularity_score
                      normalization_version: ingest/v1
                    evaluation:
                      status: skipped
                      reason: duplicate_event
                duplicateRecovered:
                  value:
                    status: duplicate
                    reason: matched_existing_canonical_event
                    canonical_event_ref:
                      kind: signal_event
                      id: evt_acct_12345_261850d7b8ef8c4d
                    event:
                      id: evt_acct_12345_261850d7b8ef8c4d
                      dedupe_key: producer=interval-detector|producer_event_id=det-884221
                      schema_version: "1"
                      subject_id: acct_12345
                      subject_kind: account
                      producer_event_id: det-884221
                      signal_type: consistent_action_interval
                      producer: interval-detector
                      occurred_at: 2026-03-07T11:45:00Z
                      ingested_at: 2026-03-07T12:00:00Z
                      severity: high
                      confidence: 0.92
                      value: 0.98
                      unit: regularity_score
                      normalization_version: ingest/v1
                    evaluation:
                      status: completed
                      snapshot_ref:
                        kind: feature_snapshot
                        id: fs_acct_12345_20260307120005
                      score_result_ref:
                        kind: score_result
                        id: score_acct_12345_score_v1_20260307120005
                      recommendation_ref:
                        kind: recommendation
                        id: rec_acct_12345_score_acct_12345_score_v1_20260307120005_20260307120005
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: "Duplicate event matched an existing canonical event; evaluation\
            \ is skipped when the prior evaluation already completed, or completed\
            \ inline when recovering from an earlier post-persist failure"
        "400":
          content:
            application/json:
              examples:
                missingOccurredAt:
                  value:
                    status: rejected
                    reason: validation_failed
                    evaluation:
                      status: skipped
                      reason: rejected_event
                    rejection_reasons:
                    - code: invalid_field
                      field: occurred_at
                      message: occurred_at is required
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: Payload rejected during ingestion validation
        "500":
          content:
            application/json:
              examples:
                storageError:
                  value:
                    status: rejected
                    reason: storage_error
                    rejection_reasons:
                    - code: storage_error
                      message: signal event could not be persisted
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: Persistence or evaluation failure
      summary: Ingest a raw detector event
      tags:
      - Signal Events
  /v1/outcome-analysis:
    get:
      description: |
        Returns a structured read model that compares persisted recommendations
        with later review outcomes. Optional filters allow narrowing the result
        by subject, recommendation type, or review label.
      operationId: getOutcomeAnalysis
      parameters:
      - explode: true
        in: query
        name: subject_id
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: recommendation_type
        required: false
        schema:
          enum:
          - allow
          - monitor
          - review
          - throttle
          - escalate
          type: string
        style: form
      - explode: true
        in: query
        name: review_label
        required: false
        schema:
          enum:
          - confirmed_abuse
          - false_positive
          - no_action
          - needs_more_context
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutcomeAnalysis"
          description: Outcome analysis read model
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: One or more query filters were invalid
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
          description: The outcome analysis could not be loaded
      summary: Get deterministic recommendation outcome analysis
      tags:
      - Subject Evaluations
  /v1/subjects/{subject_id}/latest-evaluation:
    get:
      description: |
        Returns the latest persisted feature snapshot, score result, recommendation,
        and canonical signal events used by the latest subject evaluation.
      operationId: getLatestSubjectEvaluation
      parameters:
      - $ref: "#/components/parameters/SubjectID"
      responses:
        "200":
          content:
            application/json:
              examples:
                latest:
                  value:
                    subject_id: acct_12345
                    evaluation_run:
                      id: eval_acct_12345_20260307120100_1709816460000000000
                      subject_id: acct_12345
                      trigger_type: ingest
                      ruleset_version: score/v1
                      feature_set_version: features/v1
                      started_at: 2026-03-07T12:01:00Z
                      completed_at: 2026-03-07T12:01:00Z
                      status: completed
                      snapshot_ref:
                        kind: feature_snapshot
                        id: fs_acct_12345_20260307120100
                      score_result_ref:
                        kind: score_result
                        id: score_acct_12345_score_v1_20260307120100
                      recommendation_ref:
                        kind: recommendation
                        id: rec_acct_12345_score_acct_12345_score_v1_20260307120100_20260307120100
                    signal_events:
                    - id: evt_acct_12345_261850d7b8ef8c4d
                      dedupe_key: producer=interval-detector|producer_event_id=det-884221
                      schema_version: "1"
                      subject_id: acct_12345
                      subject_kind: account
                      producer_event_id: det-884221
                      signal_type: consistent_action_interval
                      producer: interval-detector
                      occurred_at: 2026-03-07T11:45:00Z
                      ingested_at: 2026-03-07T12:00:00Z
                      severity: high
                      confidence: 0.92
                      value: 0.98
                      unit: regularity_score
                      normalization_version: ingest/v1
                    - id: evt_acct_12345_440ccdc001f06da0
                      dedupe_key: producer=api-gateway-detector|producer_event_id=det-991112
                      schema_version: "1"
                      subject_id: acct_12345
                      subject_kind: account
                      producer_event_id: det-991112
                      signal_type: api_only_activity
                      producer: api-gateway-detector
                      occurred_at: 2026-03-07T11:55:00Z
                      ingested_at: 2026-03-07T12:01:00Z
                      severity: critical
                      confidence: 0.95
                      value: 24
                      unit: api_requests
                      normalization_version: ingest/v1
                    snapshot:
                      id: fs_acct_12345_20260307120100
                      subject_id: acct_12345
                      feature_set_version: features/v1
                      evaluated_at: 2026-03-07T12:01:00Z
                      values:
                      - name: consistent_interval_count_24h
                        value: 1
                        unit: events
                      - name: api_only_activity_count_24h
                        value: 1
                        unit: events
                      summaries:
                      - name: signal_event_count_24h
                        value: 2
                        unit: events
                      provenance:
                      - kind: signal_event
                        id: evt_acct_12345_261850d7b8ef8c4d
                      - kind: signal_event
                        id: evt_acct_12345_440ccdc001f06da0
                    score_result:
                      id: score_acct_12345_score_v1_20260307120100
                      subject_id: acct_12345
                      ruleset_version: score/v1
                      evaluated_at: 2026-03-07T12:01:00Z
                      snapshot:
                        kind: feature_snapshot
                        id: fs_acct_12345_20260307120100
                      score: 50
                      band: high
                      contributions:
                      - key: consistent_interval_count_24h
                        rule_id: consistent_interval_count_24h/v1
                        category: feature
                        label: consistent action interval observed in last 24h
                        value: 15
