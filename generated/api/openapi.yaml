    RecommendationReasonCode:
      description: |
        Structured reason code that explains why a specific recommendation outcome was chosen.

        - `below_monitor_threshold`: Score is below the monitoring threshold; allow is recommended
        - `monitor_threshold_crossed`: Score crossed the monitoring threshold but not review threshold
        - `review_threshold_crossed_corroborated`: Score crossed review threshold with sufficient corroborating evidence
        - `insufficient_corroboration`: Score crossed review threshold but lacked corroborating evidence from multiple signal families
        - `dominant_signal_suppression`: Score crossed review threshold but one contribution dominated the total score
        - `low_sample_guardrail_applied`: Score contributions were capped due to insufficient sample size
        - `low_confidence_guardrail_applied`: Score contributions were dampened due to low confidence signals
      enum:
      - below_monitor_threshold
      - monitor_threshold_crossed
      - review_threshold_crossed_corroborated
      - insufficient_corroboration
      - dominant_signal_suppression
      - low_sample_guardrail_applied
      - low_confidence_guardrail_applied
      type: string
